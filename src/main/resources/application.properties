# ===== Server =====
server.port=8081
 
# ===== Spring =====
# Puedes usar MediGo si quieres unificar naming con el back.
spring.application.name=medigo-api-gateway
 
# ===== Opcional: DB/JPA/Liquibase (solo si el gateway lo requiere) =====
# spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:postgres}
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.liquibase.enabled=false
 
# Redis (compatible con Upstash via rediss://)
# Ejemplo: rediss://default:password@host:6379
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=2000ms
 
# ===== Gateway =====
# Tu monolito back corre en 8080, por eso este default.
gateway.backend.base-url=${BACKEND_URL:http://localhost:8080}
gateway.backend.timeout-seconds=30
 
gateway.jwt.secret=${JWT_SECRET:medigo-super-secret-key-must-be-at-least-256-bits-long}
gateway.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
 
gateway.rate-limit.global-per-minute=100
gateway.rate-limit.user-per-minute=500
gateway.rate-limit.bid-per-minute=10
 
# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
 
# ===== Resilience4j =====
resilience4j.circuitbreaker.instances.backendCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.backendCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.backendCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.backendCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.backendCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.backendCB.automaticTransitionFromOpenToHalfOpenEnabled=true
 
resilience4j.retry.instances.backendRetry.maxAttempts=3
resilience4j.retry.instances.backendRetry.waitDuration=500ms
resilience4j.retry.instances.backendRetry.retryExceptions[0]=org.springframework.web.client.ResourceAccessException
 
# ===== OpenAPI =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
 
# ===== Logging =====
logging.level.com.medigo.gateway=DEBUG
logging.level.org.springframework.security=DEBUG